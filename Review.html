<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #003366; /* Hotpoint Professional Navy */
        --secondary: #6c757d;
        --success: #28a745;
        --danger: #dc3545;
        --bg: #f4f7f9;
        --white: #ffffff;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 650px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: var(--primary);
        margin: 0;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Info Card */
      .card {
        background: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 30px;
        margin-bottom: 20px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 20px;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }

      .stage-badge {
        font-size: 12px;
        background: #e1ecf4;
        color: var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
      }

      /* Grid Layout for Details */
      .details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .detail-item {
        margin-bottom: 10px;
      }
      .label {
        font-size: 12px;
        color: var(--secondary);
        text-transform: uppercase;
        font-weight: 600;
      }
      .value {
        font-size: 15px;
        color: #333;
        font-weight: 500;
        margin-top: 4px;
      }

      /* Form Styling */
      label {
        font-weight: 600;
        font-size: 14px;
        color: var(--primary);
        display: block;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        height: 120px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        padding: 12px;
        font-family: inherit;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
      }

      .btn-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 25px;
      }

      button {
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-approve {
        background-color: var(--success);
        color: white;
      }
      .btn-decline {
        background-color: var(--danger);
        color: white;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .footer {
        text-align: center;
        font-size: 11px;
        color: var(--secondary);
        margin-top: 40px;
      }

      #overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 100;
      }

      /* Center the success card perfectly */
      .success-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh; /* Adjusts height to center vertically */
        text-align: center;
      }

      /* Professional SVG Styling */
      .success-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        fill: none;
        stroke: #2c3e50; /* Dark grayish/black */
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div
        style="
          border: 4px solid #f3f3f3;
          border-top: 4px solid var(--primary);
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        "
      ></div>
      <p style="margin-top: 15px; font-weight: 600; color: var(--primary)">
        Processing Request...
      </p>
    </div>

    <div class="container">
      <div class="header">
        <h1>Hotpoint Appliances Ltd</h1>
      </div>

      <div class="card">
        <div class="card-title">
          Requisition Preview
          <span class="stage-badge"
            ><?= stage ?>
            Approval Stage</span
          >
        </div>

        <div class="details-grid">
          <div class="detail-item">
            <div class="label">Employee Name</div>
            <div class="value"><?= details.employeeName ?></div>
          </div>
          <div class="detail-item">
            <div class="label">Department</div>
            <div class="value"><?= details.department ?></div>
          </div>
          <div class="detail-item">
            <div class="label">Destination</div>
            <div class="value"><?= details.destination ?></div>
          </div>
          <div class="detail-item">
            <div class="label">Estimated Budget</div>
            <div class="value">KES <?= details.budget ?></div>
          </div>
          <div class="detail-item" style="grid-column: span 2">
            <div class="label">Travel Dates</div>
            <div class="value"><?= details.dates ?></div>
          </div>
          <div class="detail-item" style="grid-column: span 2">
            <div class="label">Purpose of Travel</div>
            <div class="value"><?= details.purpose ?></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Review Decision</div>
        <label for="comment">Reviewer Comments</label>
        <textarea
          id="comment"
          placeholder="You can add a comment if necessary..."
        ></textarea>

        <div class="btn-group">
          <button
            class="btn-approve"
            id="approveBtn"
            onclick="submit('Approved')"
          >
            APPROVE REQUEST
          </button>
          <button
            class="btn-decline"
            id="declineBtn"
            onclick="submit('Declined')"
          >
            DECLINE REQUEST
          </button>
        </div>
      </div>

      <div class="footer">
        <p>
          &copy; <?= new Date().getFullYear() ?> Hotpoint Appliances Ltd. All
          rights reserved.
        </p>
        <p>Travel Requisition System</p>
      </div>
    </div>

    <script>
      function submit(status) {
        // 1. Get the comment and trim whitespace
        let comment = document.getElementById("comment").value.trim();

        // 2. Default if empty
        if (!comment) {
          comment = "No Comment";
        }

        document.getElementById("overlay").style.display = "flex";

        // 4. The Server Call
        google.script.run
          .withSuccessHandler(function (returnValue) {
            // returnValue is the "Success" string sent back from GS
            console.log("Server says: " + returnValue);

            // 1. Target the main container
            const container = document.querySelector(".container");

            // 2. Clear and apply new layout
            container.classList.add("success-container");
            container.innerHTML = `
          <div class="card" style="padding: 60px; border-top: 5px solid #2c3e50;">
            <svg class="success-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="16 9 11 14 8 11"></polyline>
            </svg>
            <h2 style="color: #2c3e50; margin-top: 0; font-weight: 700;">Decision Recorded</h2>
            <p style="color: #666; font-size: 16px; margin-bottom: 0;">
              The travel requisition has been updated successfully.<br>
              <span style="font-size: 14px; color: #999;">You may now safely close this window.</span>
            </p>
          </div>
        `;

            document.getElementById("overlay").style.display = "none";
          })
          .withFailureHandler(function (err) {
            // Good practice: show an alert if the server crashes
            alert("Error: " + err.message);
            document.getElementById("overlay").style.display = "none";
          })
          .processReview("<?= rowId ?>", status, comment, "<?= stage ?>");
      }
    </script>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </body>
</html>
