<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: #f7f3f3; /* Mist Rose */
        margin: 0;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 8px 40px rgba(62, 44, 44, 0.08); /* Warm shadow */
        padding: 56px 52px 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Subtle crimson top accent bar */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #a31d1d, #d9534f, #a31d1d);
      }

      /* Decorative background circle */
      .card::after {
        content: "";
        position: absolute;
        bottom: -60px;
        right: -60px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(163, 29, 29, 0.05) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #fff5f5, #f9f0f0);
        border: 1.5px solid #f2d7d5;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      .icon-wrap svg {
        width: 34px;
        height: 34px;
        stroke: #a31d1d; /* Deep Crimson */
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #a31d1d;
        margin: 0 0 10px;
      }

      h2 {
        font-family: "DM Serif Display", serif;
        color: #2c1a1a; /* Dark Warm Tone */
        margin: 0 0 16px;
        font-size: 26px;
        font-weight: 400;
        line-height: 1.25;
      }

      p {
        color: #453535; /* Warm Charcoal */
        font-size: 15px;
        line-height: 1.7;
        margin: 0 0 24px;
      }

      strong {
        color: #2c1a1a;
        font-weight: 600;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 20px;
        background: #fffafa;
        border: 1.5px solid #f2e8e8;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #a31d1d;
        margin-bottom: 24px;
      }

      .status-badge::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #a31d1d;
        flex-shrink: 0;
      }

      .footnote {
        font-size: 13px;
        color: #8c7474; /* Muted Rose-Gray */
        line-height: 1.6;
        margin: 0;
        padding-top: 20px;
        border-top: 1px solid #f2e8e8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <line x1="12" y1="16" x2="12" y2="11.5"></line>
          <circle
            cx="12"
            cy="8.5"
            r="0.5"
            fill="#a31d1d"
            stroke="none"
          ></circle>
        </svg>
      </div>

      <p class="eyebrow">Notice</p>
      <h2>Action Already Taken</h2>

      <p>
        This travel requisition has already been processed at the
        <strong><?= stage ?></strong> stage.
      </p>

      <div class="status-badge">Status: <?= status ?></div>

      <p class="footnote">
        You cannot modify this record further. If you believe this is an error,
        please contact your system administrator.
      </p>
    </div>
  </body>
</html>
