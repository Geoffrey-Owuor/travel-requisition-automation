<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #f4f4f4; /* Light gray background */
        margin: 0;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        padding: 56px 52px 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Bold red top accent bar */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: #c8102e; /* Hotpoint Red */
      }

      /* Subtle decorative background circle */
      .card::after {
        content: "";
        position: absolute;
        bottom: -60px;
        right: -60px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(200, 16, 46, 0.04) 0%,
          /* Faint red */ transparent 70%
        );
        pointer-events: none;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #fff5f5; /* Very light red tint */
        border: 2px solid #fbcfe8; /* Soft red border */
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      .icon-wrap svg {
        width: 34px;
        height: 34px;
        stroke: #c8102e; /* Hotpoint Red */
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #c8102e; /* Hotpoint Red */
        margin: 0 0 10px;
      }

      h2 {
        color: #1a1a1a; /* Rich Black */
        margin: 0 0 16px;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.3;
      }

      p {
        color: #333333; /* Dark Gray */
        font-size: 15px;
        line-height: 1.7;
        margin: 0 0 24px;
      }

      strong {
        color: #1a1a1a;
        font-weight: 700;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        background: #fafafa; /* Very light gray */
        border: 1px solid #e0e0e0;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #333333;
        margin-bottom: 24px;
      }

      .status-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #1a1a1a; /* Black dot */
        flex-shrink: 0;
      }

      .footnote {
        font-size: 13px;
        color: #757575; /* Accent gray */
        line-height: 1.6;
        margin: 0;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <line x1="12" y1="16" x2="12" y2="11.5"></line>
          <circle cx="12" cy="8.5" r="1" fill="#C8102E" stroke="none"></circle>
        </svg>
      </div>

      <p class="eyebrow">Notice</p>
      <h2>Action Already Taken</h2>

      <p>
        This travel requisition has already been processed at the
        <strong><?= stage ?></strong> stage.
      </p>

      <div class="status-badge">Status: <?= status ?></div>

      <p class="footnote">
        You cannot modify this record further. If you believe this is an error,
        please contact your system administrator.
      </p>
    </div>
  </body>
</html>
