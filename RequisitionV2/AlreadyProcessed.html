<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f4f7f9;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
      }
      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 60px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        border-top: 5px solid #2c3e50;
      }
      .info-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        fill: none;
        stroke: #2c3e50;
        stroke-width: 2;
      }
      h2 {
        color: #1a1a1a;
        margin-top: 0;
        font-weight: 700;
      }
      p {
        color: #666;
        font-size: 16px;
        line-height: 1.6;
      }
      .status-badge {
        display: inline-block;
        padding: 5px 15px;
        background: #eee;
        border-radius: 20px;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 12px;
        color: #333;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="info-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <h2>Action Already Taken</h2>
      <p>
        This travel requisition has already been processed at the
        <strong><?= stage ?></strong> stage.
      </p>
      <div class="status-badge">Current Status: <?= status ?></div>
      <p style="font-size: 14px; color: #999; margin-top: 20px">
        You cannot modify this record further. If this is an error, please
        contact the system administrator.
      </p>
    </div>
  </body>
</html>
